version: 1

# Baseline SOPS key catalog (typically ~/.config/elr/config.yaml or /etc/elr/config.yaml).
# Repo overlay: sops.oci.yaml with sync.key selects which catalog entry applies.

sops:
  defaults:
    key: default
    env_file: .env.sops
    age_key_dir: ~/.config/sops/age
  keys:
    default:
      provider: oci
      location: dev-env
      secret: sops-age-key
    work:
      provider: oci
      location: dev-env
      secret: sops-age-key-work

providers:
  oci:
    auth:
      mode: config_file
      config_file: ~/.oci/config
      profile: ELR
    locations:
      dev-env:
        compartment_id: ocid1.compartment.oc1...
        vault_id: ocid1.vault.oc1...
        secrets:
          - sops-age-key
          - sops-age-key-work
