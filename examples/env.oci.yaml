version: 1

# Public project manifest (env.oci.yaml) — repo overlay delta only.
# ELR loads /etc/elr → ~/.config/elr → this file (repo wins on conflict).

# Optional: repo-specific location delta (uncommon)
providers:
  oci:
    locations:
      dev-env:
        secrets:
          - repo-only-bundle    # unioned with system/user secrets list

imports:
  - provider: oci
    location: dev-env
    vars:
      - REPO_ONLY_TOKEN

sops:
  env:
    app: .env.sops          # override path if needed
  keys:
    my-repo:
      location: dev-env
      key: sops-age-key-my-repo   # catalog_id=my-repo; .key=OCI Vault object name (not .secret)

local:
  CLI_PROXY_BASE_URL: https://proxy.example.com/v1
